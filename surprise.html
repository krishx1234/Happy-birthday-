<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="surprise.css">
  <title>Surprise 🎁</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #fff;
    }

    h1 {
      margin-top: 20px;
      font-size: 26px;
    }

    .video-container {
      margin: 30px auto;
      padding: 15px;
      width: 90%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    video {
      width: 100%;
      height: 100;
      border-radius: 15px;
    }

    /* Hover effect */
    .video-container:hover {
      transform: scale(1.03);
      transition: 0.3s;
    }
  </style>
</head>

<body>

  <h1>🎬 A Special Surprise For You 💖</h1>

  <!-- Video 1 -->
   <div class="video-wrapper">
  <div class="video-container">
    <video controls>
      <source src="videos/video2.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Video 2 -->
  <div class="video-container">
    <video controls>
      <source src="videos/video3.mp4" type="video/mp4">
    </video>
  </div>

  <!-- Video 3 -->
  <div class="video-container">
    <video controls>
      <source src="videos/video1.mp4" type="video/mp4">
    </video>
  </div>
  </div>

<!-- Button -->
<button class="next-btn" onclick="openPage()">Memories 💖</button>

<style>
.next-btn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  font-size: 16px;
  z-index: 999;
  background: linear-gradient(45deg, #ff4da6, #ff99cc);
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* hover effect */
.next-btn:hover {
  transform: translateX(-50%) scale(1.05);
}
</style>

<script>
function openPage() {
  window.location.href = "beauty.html"; // apne dusre page ka naam
}
</script>
</body>
</html>
